name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install fzf
        run: brew install fzf

      - name: Run tests
        run: zsh tests/run_tests.zsh
